apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: kineticz
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/cpu-throttling: "false"
        kineticz.dev/deploy-ts: "2026-06-02T16-48"
    spec:
      timeoutSeconds: 300
      containerConcurrency: 80
      containers:
        - image: us-central1-docker.pkg.dev/blade-agent-488115/kineticz/kineticz:latest
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              memory: "512Mi"
              cpu: "1000m"
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: MONGO_URI
                  key: latest
            - name: GEMINI_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: GEMINI_PROJECT_ID
                  key: latest
            - name: GEMINI_LOCATION
              value: global
            - name: GEMINI_MODEL
              value: gemini-3.5-flash
            - name: GITLAB_URL
              value: https://gitlab.com
            - name: GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: GITLAB_TOKEN
                  key: latest
            - name: GITLAB_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: GITLAB_PROJECT_ID
                  key: latest
            - name: PHOENIX_COLLECTOR_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: PHOENIX_COLLECTOR_ENDPOINT
                  key: latest
            - name: PHOENIX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: PHOENIX_API_KEY
                  key: latest
            # PHOENIX_HOST is the Phoenix app URL with the space path, distinct
            # from the OTLP collector endpoint above (no /v1/traces). The MCP
            # self-introspection leg spawns phoenix-mcp against it. Replace
            # your-space before deploy. Unset/placeholder leaves the leg degraded
            # and the apply path unchanged.
            - name: PHOENIX_HOST
              value: https://app.phoenix.arize.com/s/your-space
            # Phoenix project the diagnose leg queries for prior repair spans.
            # Must match the project Kineticz's OTLP traces land in.
            - name: PHOENIX_PROJECT
              value: default
            - name: ELASTIC_URL
              valueFrom:
                secretKeyRef:
                  name: ELASTIC_URL
                  key: latest
            - name: ELASTIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ELASTIC_API_KEY
                  key: latest
            - name: DYNATRACE_URL
              valueFrom:
                secretKeyRef:
                  name: DYNATRACE_URL
                  key: latest
            - name: DYNATRACE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: DYNATRACE_TOKEN
                  key: latest
            - name: FIVETRAN_SECRET
              valueFrom:
                secretKeyRef:
                  name: FIVETRAN_SECRET
                  key: latest
            - name: KINETICZ_ED25519_SEED
              valueFrom:
                secretKeyRef:
                  name: KINETICZ_ED25519_SEED
                  key: latest
  traffic:
    - percent: 100
      latestRevision: true
